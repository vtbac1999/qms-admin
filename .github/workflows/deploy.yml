name: Deploy Laravel M4 (Single Container)

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: self-hosted
    steps: # Đã sửa lề đoạn này
      - name: Check Disk Space
        run: |
          echo "Dung lượng ổ cứng hiện tại:"
          df -h
          echo "Dung lượng các thư mục deploy cũ:"
          du -sh ../deploy-* || true
          echo "Dung lượng Docker đang chiếm dụng:"
          docker system df
      - name: System Cleanup
        run: |
          # Xóa các image, container, network và cache thừa không dùng đến
          docker system prune -af
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          path: "deploy-${{ github.run_number }}"

      - name: Auto Deploy
        run: |
          cd deploy-${{ github.run_number }}
          
          # 1. Tạo file .env (Thêm APP_URL để Vite không bị nhầm port khi chạy Docker)
          echo "APP_KEY=" > .env
          echo "APP_URL=https://admin.vtbac.io.vn" >> .env
          echo "ASSET_URL=https://admin.vtbac.io.vn" >> .env
          echo "DB_CONNECTION=mysql" >> .env
          echo "DB_HOST=36.50.55.56" >> .env
          echo "DB_PORT=3306" >> .env
          echo "DB_DATABASE=qms" >> .env
          echo "DB_USERNAME=root" >> .env
          echo "DB_PASSWORD=admin123" >> .env
          
          # 2. Xóa container cũ (Lưu ý dùng đúng tên trong docker-compose.yml của bạn)
          docker rm -f laravel_project2_m4 laravel_m4_db || true
          
          # 3. Build và khởi động
          docker compose up -d --build
          
          # 4. Thiết lập Laravel
          # Chờ DB khởi động lâu hơn chút nếu máy Mac đang bận
          sleep 7
          docker exec laravel_project2_m4 php artisan key:generate
          
          # 5. Build Frontend (npm install thường lâu, bạn có thể cân nhắc skip nếu đã có thư mục)
          docker exec laravel_project2_m4 npm install --force
          docker exec laravel_project2_m4 npm run build
          
          # 6. Dọn dẹp cache và chạy Migration
          docker exec laravel_project2_m4 php artisan config:clear
          docker exec laravel_project2_m4 php artisan migrate --force

      - name: Post-cleanup old folders
        if: always() # Chạy bước này kể cả khi các bước trên bị lỗi để dọn dẹp ổ cứng
        run: |
          # Thoát ra thư mục _work/qms-admin/qms-admin
          cd ${{ github.workspace }}/.. 
          find . -maxdepth 1 -type d -name "deploy-*" ! -name "deploy-${{ github.run_number }}" -exec rm -rf {} + || true
