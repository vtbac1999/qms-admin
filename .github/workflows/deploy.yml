name: Deploy Laravel M4 (Single Container)

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      # 1. Tạo một cái tên thư mục dựa trên mã ID của lần chạy này (không bao giờ trùng)
      - name: Checkout to a fresh directory
        uses: actions/checkout@v4
        with:
          path: "fresh-deploy" # Tải code vào thư mục 'fresh-deploy' thay vì thư mục gốc

      - name: Deploy from fresh directory
        run: |
          # Chuyển hẳn vào thư mục mới vừa tải về
          cd fresh-deploy
          docker rm -f laravel_m4_db || true
          docker rm -f laravel_project2_m4 || true
          # Copy file .env (nếu bạn có lưu ở thư mục cha) hoặc tạo mới như nãy mình làm
          # Ở đây ta giả định tạo mới cho chắc ăn
          echo "APP_KEY=" > .env
          echo "DB_CONNECTION=mysql\nDB_HOST=db-mysql\nDB_PORT=3306\nDB_DATABASE=qms_admin\nDB_USERNAME=root\nDB_PASSWORD=Admin@123" >> .env
          
          # Dừng container cũ (đang dùng folder bị khóa)
          docker compose -f ../docker-compose.yml down || true
          
          # Chạy Docker Compose mới từ thư mục này
          docker compose up -d --build
          
          # Các lệnh Artisan như cũ
          docker exec laravel_project2_m4 php artisan key:generate
          docker exec laravel_project2_m4 php artisan config:clear
          docker exec laravel_project2_m4 php artisan migrate --force
