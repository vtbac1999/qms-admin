name: Deploy Laravel M4 (Single Container)

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Pre-checkout cleanup
        run: |
          if [ -d "${{ github.workspace }}/node_modules" ]; then
            sudo rm -rf ${{ github.workspace }}/node_modules
          fi
          # Cho phép runner có quyền trên toàn bộ thư mục làm việc
          sudo chown -R $USER:$USER ${{ github.workspace }}
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy on Mac Mini
        run: |
          docker compose up -d --build
          echo "Đợi MySQL khởi động trong 20 giây..."
          sleep 20
          docker exec laravel_project2_m4 php artisan migrate --force
          docker exec laravel_project2_m4 php artisan config:cache