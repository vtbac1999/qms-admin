name: Deploy Laravel M4 (Single Container)

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Bypass Cleanup by Renaming
        run: |
          # Dừng toàn bộ container để "nhả" folder
          docker compose down || true
          
          # Thay vì xóa (lỗi permission), ta đổi tên nó sang một folder rác
          # Lệnh mv (move) thường không bị chặn quyền gắt gao như rm
          TIMESTAMP=$(date +%s)
          mv node_modules node_modules_old_$TIMESTAMP || true
          mv vendor vendor_old_$TIMESTAMP || true
          mv public/build public_build_old_$TIMESTAMP || true
          
          # Thông báo để mình biết
          echo "Đã đổi tên các folder bị khóa để bypass checkout."
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy on Mac Mini
        run: |
          docker compose up -d --build
          echo "Đợi MySQL khởi động trong 20 giây..."
          sleep 20
          docker exec laravel_project2_m4 php artisan migrate --force
          docker exec laravel_project2_m4 php artisan config:cache
